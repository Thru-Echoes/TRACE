name: trace-dev
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.13
  - pip
  - pip:
    # ── Core TRACE dependencies ──
    - "mcp>=1.0.0"
    - "pydantic>=2.0"

    # ── LLM integration (tier 1 embeddings + LLM extraction) ──
    - "openai>=1.0"

    # ── Local embeddings (tier 2 — model2vec potion-base-8M) ──
    - "numpy>=1.24"
    - "model2vec>=0.4"

    # ── Dev / testing ──
    - "pytest>=8.0"
    - "pytest-asyncio>=0.23"
    - "pytest-cov>=5.0"
    - "ruff>=0.4"
    - "pyright>=1.1.350"
    - "jsonschema>=4.0"

    # ── Install TRACE itself in editable mode ──
    - "-e .[all,dev]"
