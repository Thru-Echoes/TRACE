repos:
  # Ruff - linting and formatting (very fast)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # Pyright - type checking (~1.5s)
  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.359
    hooks:
      - id: pyright
        additional_dependencies: [mcp]  # Add any deps pyright needs
